  <circle cx="5" cy="26" r="1.8" fill="white" opacity="0.4"/>
  <circle cx="13" cy="17" r="2.2" fill="white" opacity="0.7"/>
  <circle cx="20" cy="9" r="2.5" fill="white"/>
  <!-- Amber Zukunftspunkt mit Glow -->
  <circle cx="28" cy="2" r="4.5" fill="#F59E0B" opacity="0.25"/>
